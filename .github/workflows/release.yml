name: Release AppImage

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  appimage:
    runs-on: ubuntu-24.04
    env:
      # Evita depender de FUSE para ejecutar los AppImage de las herramientas.
      APPIMAGE_EXTRACT_AND_RUN: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config git file patchelf desktop-file-utils \
            librsvg2-bin \
            libgtk-4-dev \
            meson ninja-build \
            libwayland-dev libwayland-bin wayland-protocols

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build & install gtk4-layer-shell
        run: |
          git clone --depth 1 --branch v1.0.4 https://github.com/wmww/gtk4-layer-shell.git
          cd gtk4-layer-shell
          meson setup build \
            --prefix=/usr \
            -Dexamples=false -Ddocs=false -Dtests=false \
            -Dintrospection=false -Dvapi=false
          ninja -C build
          sudo ninja -C build install
          sudo ldconfig

      - name: Build QuickFind
        run: cargo build --release --locked --features layer-shell

      - name: Assemble AppDir
        run: |
          APPDIR=AppDir
          install -Dm755 target/release/quickfind "$APPDIR/usr/bin/quickfind"
          install -Dm644 quickfind.desktop "$APPDIR/usr/share/applications/quickfind.desktop"
          install -Dm644 resources/quickfind.svg \
            "$APPDIR/usr/share/icons/hicolor/scalable/apps/quickfind.svg"
          rsvg-convert -w 256 -h 256 resources/quickfind.svg -o quickfind.png
          install -Dm644 quickfind.png \
            "$APPDIR/usr/share/icons/hicolor/256x256/apps/quickfind.png"

      - name: Download linuxdeploy + gtk plugin
        run: |
          base="https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous"
          gtkbase="https://raw.githubusercontent.com/linuxdeploy/linuxdeploy-plugin-gtk/master"
          curl -fsSL -o linuxdeploy "$base/linuxdeploy-x86_64.AppImage"
          curl -fsSL -o linuxdeploy-plugin-gtk.sh "$gtkbase/linuxdeploy-plugin-gtk.sh"
          chmod +x linuxdeploy linuxdeploy-plugin-gtk.sh

      - name: Build AppImage
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [ -z "$VERSION" ] && VERSION="dev"
          export VERSION
          ./linuxdeploy --appdir AppDir \
            --plugin gtk \
            -i quickfind.png \
            -d quickfind.desktop \
            --output appimage
          mkdir -p dist
          mv QuickFind*.AppImage "dist/QuickFind-${VERSION}-x86_64.AppImage"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: quickfind-appimage
          path: dist/*.AppImage

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.AppImage
